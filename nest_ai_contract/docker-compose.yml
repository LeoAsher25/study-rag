services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_contract_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_contract
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai_contract_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: ai_contract_api
    command: node dist/main.js
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_contract
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/data/uploads
      PORT: 4001
    env_file: .env
    volumes:
      - upload_data:/app/data/uploads
    ports:
      - "4001:4001"
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: ai_contract_worker
    command: node dist/worker.js
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_contract
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/data/uploads
    env_file: .env
    volumes:
      - upload_data:/app/data/uploads
    depends_on:
      - db
      - redis

volumes:
  db_data:
  upload_data:
