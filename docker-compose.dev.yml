# Local / dev: full stack kèm DB + Redis trong container.
# Chạy: docker-compose -f docker-compose.dev.yml up -d

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_contract_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_contract
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai_contract_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./nest_ai_contract
    container_name: ai_contract_api
    command: node dist/main.js
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_contract
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/data/uploads
      PORT: 4001
    env_file:
      - ./nest_ai_contract/.env
    volumes:
      - upload_data:/app/data/uploads
    ports:
      - "4001:4001"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./nest_ai_contract
    container_name: ai_contract_worker
    command: node dist/worker.js
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_contract
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/data/uploads
    env_file:
      - ./nest_ai_contract/.env
    volumes:
      - upload_data:/app/data/uploads
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./next-ai-contract
    container_name: ai_contract_frontend
    environment:
      PORT: 4000
      NEXT_PUBLIC_API_BASE_URL: http://api:4001
    depends_on:
      - api
    ports:
      - "4000:4000"

volumes:
  db_data:
  upload_data:
